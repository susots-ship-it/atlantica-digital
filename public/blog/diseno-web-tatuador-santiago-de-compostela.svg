<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="100%" style="stop-color:#111118"/>
    </linearGradient>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <linearGradient id="glow" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Glow orb -->
  <circle cx="900" cy="200" r="250" fill="url(#glow)" opacity="0.4"/>
  <circle cx="200" cy="500" r="180" fill="url(#glow)" opacity="0.2"/>

  <!-- Tattoo machine icon -->
  <g transform="translate(820, 140) scale(2.5)" fill="none" stroke="url(#brand)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- Needle -->
    <line x1="60" y1="80" x2="60" y2="110" stroke-width="2.5"/>
    <!-- Machine body -->
    <rect x="40" y="30" width="40" height="50" rx="6" fill="#16161f" stroke="url(#brand)" stroke-width="2"/>
    <!-- Grip -->
    <rect x="50" y="60" width="20" height="30" rx="3" fill="#16161f" stroke="url(#brand)" stroke-width="1.5"/>
    <!-- Coils -->
    <circle cx="52" cy="42" r="6" fill="none" stroke="url(#brand)" stroke-width="1.5"/>
    <circle cx="68" cy="42" r="6" fill="none" stroke="url(#brand)" stroke-width="1.5"/>
    <!-- Top bar -->
    <line x1="45" y1="30" x2="75" y2="30" stroke-width="2"/>
    <!-- Armature bar -->
    <path d="M55 30 L55 18 L70 18" stroke-width="1.5"/>
    <!-- Contact screw -->
    <circle cx="70" cy="18" r="3" fill="#3b82f6"/>
    <!-- Ink drops -->
    <circle cx="60" cy="118" r="2" fill="#3b82f6" opacity="0.7"/>
    <circle cx="57" cy="126" r="1.5" fill="#06b6d4" opacity="0.5"/>
  </g>

  <!-- Santiago Cathedral silhouette (simplified) -->
  <g transform="translate(750, 380)" fill="#16161f" stroke="rgba(59,130,246,0.2)" stroke-width="1">
    <!-- Main cathedral body -->
    <rect x="60" y="100" width="280" height="120" rx="2"/>
    <!-- Central tower -->
    <rect x="160" y="20" width="80" height="80" rx="2"/>
    <polygon points="200,0 230,20 170,20"/>
    <!-- Left tower -->
    <rect x="80" y="50" width="50" height="70" rx="2"/>
    <polygon points="105,30 125,50 85,50"/>
    <!-- Right tower -->
    <rect x="270" y="50" width="50" height="70" rx="2"/>
    <polygon points="295,30 315,50 275,50"/>
    <!-- Cross on central tower -->
    <line x1="200" y1="-10" x2="200" y2="3" stroke="rgba(59,130,246,0.4)" stroke-width="2"/>
    <line x1="194" y1="-4" x2="206" y2="-4" stroke="rgba(59,130,246,0.4)" stroke-width="2"/>
  </g>

  <!-- Text content -->
  <text x="80" y="200" fill="#f0f0f5" font-family="Georgia, 'Playfair Display', serif" font-size="52" font-weight="700">
    <tspan x="80" dy="0">Diseño Web para</tspan>
    <tspan x="80" dy="68">Tatuadores</tspan>
  </text>

  <!-- Location badge -->
  <g transform="translate(80, 350)">
    <rect width="320" height="42" rx="21" fill="rgba(59,130,246,0.15)" stroke="rgba(59,130,246,0.25)" stroke-width="1"/>
    <!-- Pin icon -->
    <circle cx="28" cy="21" r="5" fill="none" stroke="#60a5fa" stroke-width="1.5"/>
    <circle cx="28" cy="19" r="2" fill="#60a5fa"/>
    <path d="M28 26 L28 30" stroke="#60a5fa" stroke-width="1.5"/>
    <text x="46" y="26" fill="#60a5fa" font-family="'DM Sans', Arial, sans-serif" font-size="16" font-weight="600">Santiago de Compostela · Galicia</text>
  </g>

  <!-- Brand -->
  <g transform="translate(80, 540)">
    <rect width="36" height="36" rx="8" fill="url(#brand)"/>
    <text x="12" y="26" fill="white" font-family="Georgia, 'Playfair Display', serif" font-size="20" font-weight="800">T</text>
    <text x="48" y="25" fill="#9898a8" font-family="'DM Sans', Arial, sans-serif" font-size="15" font-weight="500">travesia21.es</text>
  </g>

  <!-- Decorative border -->
  <rect x="4" y="4" width="1192" height="622" rx="8" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
</svg>
