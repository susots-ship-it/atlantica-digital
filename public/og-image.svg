  <text x="80" y="430" font-family="sans-serif" font-size="48" font-weight="700" fill="white">para Pymes y Autónomos</text>
  <!-- Subtitle -->
  <text x="80" y="520" font-family="sans-serif" font-size="28" fill="#94a3b8">Diseño web · Hosting · SEO · Marketing Digital</text>
