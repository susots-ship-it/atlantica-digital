      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Logo icon -->
  <rect x="80" y="80" width="80" height="80" rx="20" fill="url(#brand)"/>
  <text x="120" y="145" font-family="Georgia, serif" font-size="52" font-weight="800" fill="white" text-anchor="middle">T</text>
  <!-- Brand name -->
  <text x="180" y="148" font-family="Georgia, serif" font-size="52" font-weight="700" fill="white">Travesía</text>
  <text x="578" y="148" font-family="Georgia, serif" font-size="80" font-weight="800" fill="url(#brand)">21</text>
